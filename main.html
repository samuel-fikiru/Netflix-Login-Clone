<!DOCTYPE html>
<html>
  <head>
    <title>Netflix</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  />
  <link
    rel="preload"
    as="font"
    crossorigin="anonymous"
    href="https://occ.a.nflxso.net/genc/hawkins/5.4.0/font/netflix-sans-core-variable-full.woff2"
    type="font/woff2"
  />

  <body>
    <div class="body-container">
      <img class="bg-img" src="images/bg-img.jpg" />
      <div class="black-cover"></div>
      <img class="netflix-text" src="images/net-text.png" />
      <div class="sign-form-conatainer">
        <h1 class="sign-text">Sign In</h1>
        <input class="input" type="text" placeholder="Email or mobile number" />
        <input class="input" type="text" placeholder="Password" />
        <button class="sign-button">Sign In</button>
        <p class="or-text">OR</p>
        <button class="sign-method">Use a Sign-In Code</button>
        <a class="" href="https://www.netflix.com/et/loginHelp">
          Forgot password?
        </a>
        <div class="bottom-sign-form">
          <div class="start-align">
            <div class="rem-container">
              <label>
                <input class="check-box" type="checkbox" id="myCheckbox" name="myCheckbox" checked/>
                <p class="remember-text">Remember me</p>
              </label>
            </div>
            <div class="request-container">
              <p class="new-text">New to Netflix?</p>
              <a
                class="sign-now"
                href="https://www.netflix.com/et/"
                class="sign-now"
                >Sign up now.</a
              >
            </div>
            <p class="captcha-text">
              This page is protected by Google reCAPTCHA to ensure you're not a
              bot.
            </p>
            <a href="" class="learn-more">Learn more.</a>
          </div>
        </div>
      </div>
    </div>
    <div class="footer">
      <p class="q-text">Questions?</p>
      <a class="contact-text" href="https://help.netflix.com/en/contactus"
        >Contact us.</a
      >
      <div class="links">
        <a class="link" href="">FAQ</a>
        <a class="link" class="link" href="">Help Center</a>
        <a class="link" href="">Terms of Use</a>
        <a class="link" href="">Privacy</a>
        <a class="link" href="">Cookie Preferences</a>
        <a class="link" href="">Corporate Information</a>
      </div>
    </div>
  </body>
</html>
